name: CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      # Using npm install to ensure it works even if package-lock.json is missing initially
      run: npm install

    - name: Run linter
      run: npm run lint

    - name: Build project
      run: npm run build
